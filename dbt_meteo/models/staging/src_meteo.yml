version: 2

sources:
  - name: meteo_raw
    database: meteo_weather
    schema: main
    tables:
      - name: fct_weather_history
        description: "Données météo brutes chargées depuis les fichiers CSV"
        columns:
          - name: city_id
            description: "Identifiant unique de la ville (FK)"
          - name: temp_min
            description: "Température minimale journalière brute"
          - name: temp_max
            description: "Température maximale journalière brute"
          - name: precipitation_sum
            description: "Cumul des précipitations journalières en mm"
      - name: dim_cities
        description: "Référentiel des villes configurées"
      - name: dim_calendar
        description: "Dimension temporelle"