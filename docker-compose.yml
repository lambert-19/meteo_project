services:
  dagster:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: meteo_dagster_app
    ports:
      - "3000:3000"
      - "8501:8501"
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - METEO_DATABASE_PATH=/app/data/meteo.duckdb
      - PYTHONLEGACYWINDOWSSTDIO=1
      - DISABLE_CSV_SENSOR=true
    volumes:
      - dagster_storage:/opt/dagster/dagster_home
      - ./data:/app/data
      - .:/app
    restart: always

volumes:
  dagster_storage:
    driver: local